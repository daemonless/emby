build:
  auto_version: true
  variants:
    # NOTE: upstream binary (4.9.5.0) has a transcoding regression on FreeBSD.
    # :latest is aliased to :pkg (4.9.3.0 via quarterly pkgs) until fixed.
    - tag: pkg
      containerfile: Containerfile.pkg
      aliases: [latest]
    - tag: pkg-latest
      containerfile: Containerfile.pkg
      args:
        BASE_VERSION: "15-latest"

cit:
  mode: screenshot
  port: 8096
  annotations:
    - "org.freebsd.jail.allow.mlock=true"

