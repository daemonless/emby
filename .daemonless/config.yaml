build:
  auto_version: true
  variants:
    # NOTE: upstream binary (4.9.5.0) has a transcoding regression on FreeBSD.
    # :latest is aliased to :pkg (4.9.3.0 via quarterly pkgs) until fixed.
    - tag: pkg
      containerfile: Containerfile.pkg
      aliases: [latest]
    - tag: pkg-latest
      containerfile: Containerfile.pkg
      args:
        BASE_VERSION: "15-latest"
    - tag: beta
      containerfile: Containerfile
      args:
        UPSTREAM_URL: "https://api.github.com/repos/MediaBrowser/Emby.Releases/releases"
        UPSTREAM_JQ: "[.[] | select(.prerelease)] | first | .tag_name"

cit:
  mode: screenshot
  port: 8096
  ready: "Core startup complete"
  screenshot_wait: 10
  annotations:
    - "org.freebsd.jail.allow.mlock=true"

